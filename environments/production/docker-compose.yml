name: mamute-politico-ui-prod

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - frontend
    restart: unless-stopped

  ui:
    build:
      context: ../../ui
      dockerfile: environments/production/Dockerfile
    networks:
      - frontend
    restart: unless-stopped

  mamute-politico-chatbot:
    build:
      context: ../../chatbot_backend
      dockerfile: Dockerfile
    image: mamute-politico-chatbot:latest
    container_name: mamute-politico-chatbot
    volumes:
      - ../../chatbot_backend/.env:/app/.env
    networks:
      - frontend
    restart: unless-stopped

  ghost-db:
    image: mysql:8.0
    environment:
      # TODO: Remove hardcoded values
      MYSQL_ROOT_PASSWORD: ${GHOST_DB_PASSWORD:-change_me}
      MYSQL_DATABASE: ghost
    volumes:
      - ghost_db_data:/var/lib/mysql
    networks:
      - backend
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      retries: 10
    restart: unless-stopped

  ghost:
    image: ghost:latest
    environment:
      url: ${PUBLIC_URL:-http://localhost}
      NODE_ENV: production
      database__client: mysql
      database__connection__host: ghost-db
      database__connection__user: root
      # TODO: Remove hardcoded values
      database__connection__password: ${GHOST_DB_PASSWORD:-change_me}
      database__connection__database: ghost
    volumes:
      - ghost_content:/var/lib/ghost/content
    networks:
      - frontend
      - backend
    depends_on:
      ghost-db:
        condition: service_healthy
    restart: unless-stopped

networks:
  frontend:
    name: mamute-politico-ui-prod-frontend
  backend:
    name: mamute-politico-ui-prod-backend

volumes:
  caddy_data:
  caddy_config:
  ghost_content:
  ghost_db_data:

